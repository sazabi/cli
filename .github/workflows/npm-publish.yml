name: Publish to npm

on:
  push:
    branches:
      - main

concurrency:
  group: npm-publish
  cancel-in-progress: false

# Repo-level default: no permissions. Each job opts in explicitly.
permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for npm trusted publishing (OIDC)

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify dist/index.js exists
        run: |
          if [ ! -f dist/index.js ]; then
            echo "::error::dist/index.js not found. The monorepo sync must push this file before publishing."
            exit 1
          fi

      - name: Verify release-manifest.json exists
        run: |
          if [ ! -f release-manifest.json ]; then
            echo "::error::release-manifest.json not found. The monorepo sync must push this file before publishing."
            exit 1
          fi

      - name: Verify manifest version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./release-manifest.json').version")
          if [ "$PKG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Version mismatch: package.json ($PKG_VERSION) != release-manifest.json ($MANIFEST_VERSION)"
            exit 1
          fi

      - name: Smoke test — version
        run: node dist/index.js --version

      - name: Smoke test — help
        run: node dist/index.js --help

      - name: Check if version is already published
        id: version-check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version 2>/dev/null; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${PACKAGE_NAME}@${PACKAGE_VERSION} is already published. Skipping."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.already_published == 'false'
        run: npm publish --provenance --access public
